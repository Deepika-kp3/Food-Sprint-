
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Sprint - My Cart</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.70)),
    url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.heading{
    text-align:center;
    color:white;
    font-size:45px;
    margin-bottom:35px;
    text-shadow:2px 2px 10px black;
}

.cart{
    background:rgba(255,255,255,.96);
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#ff5722;
    color:white;
    padding:15px;
    font-size:18px;
}

td{
    text-align:center;
    padding:18px;
    border-bottom:1px solid #ddd;
}

img{
    width:90px;
    height:90px;
    border-radius:10px;
    object-fit:cover;
}

.quantity-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.qty-btn{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#ff5722;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.qty-btn:hover{
    background:#e64a19;
    transform:scale(1.08);
}

.qty{
    width:30px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.remove-btn{
    background:#e53935;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.remove-btn:hover{
    background:#c62828;
}

.summary{
    margin-top:30px;
    text-align:right;
}

.summary h2{
    color:#ff5722;
    font-size:30px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    margin-top:30px;
}

.btn{
    text-decoration:none;
    color:white;
    background:#ff5722;
    padding:14px 28px;
    border-radius:8px;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    background:#e64a19;
}

.checkout{
    background:#2e7d32;
}

.checkout:hover{
    background:#1b5e20;
}

@media(max-width:768px){

table{
    display:block;
    overflow-x:auto;
}

.heading{
    font-size:32px;
}

.buttons{
    flex-direction:column;
    gap:15px;
}

.btn{
    text-align:center;
}

}

</style>

</head>

<body>

<div class="container">

<h1 class="heading">
🍔 Food Sprint - My Cart
</h1>

<div class="cart">

<table>

<tr>

<th>Image</th>
<th>Food Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>

</tr>

<tr>

<td>
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=300&q=80">
</td>

<td>Veg Burger</td>

<td>₹150</td>

<td>

<div class="quantity-box">

<button class="qty-btn">−</button>

<span class="qty">2</span>

<button class="qty-btn">+</button>

</div>

</td>

<td>₹300</td>

<td>

<button class="remove-btn">
Remove
</button>

</td>

</tr>

<tr>

<td>
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=300&q=80">
</td>

<td>Cheese Pizza</td>

<td>₹250</td>

<td>

<div class="quantity-box">

<button class="qty-btn">−</button>

<span class="qty">1</span>

<button class="qty-btn">+</button>

</div>

</td>

<td>₹250</td>

<td>

<button class="remove-btn">
Remove
</button>

</td>

</tr>

<tr>

<td>
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=300&q=80">
</td>

<td>Chicken Pizza</td>

<td>₹350</td>

<td>

<div class="quantity-box">

<button class="qty-btn">−</button>

<span class="qty">1</span>

<button class="qty-btn">+</button>

</div>

</td>

<td>₹350</td>

<td>

<button class="remove-btn">
Remove
</button>

</td>

</tr>

</table>

<div class="summary">

<h2>
Grand Total : ₹900
</h2>

</div>

<div class="buttons">

<a href="restaurant.html" class="btn">
⬅ Add More Items
</a>

<a href="checkout.html" class="btn checkout">
Proceed To Checkout ➜
</a>

</div>

</div>

</div>

</body>
</html>
