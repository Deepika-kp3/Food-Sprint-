<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Sprint - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1500&q=80");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:430px;
    padding:5px;
    border-radius:22px;
    background:linear-gradient(135deg,#e23744,#ff5f6d,#ff9a44);
    box-shadow:0 0 30px rgba(226,55,68,.6);
}

.inner{
    background:white;
    padding:35px;
    border-radius:18px;
    position:relative;
    overflow:hidden;
    border:4px solid #e23744;
}

.inner::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:#e23744;
}

.inner::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:8px;
    background:#e23744;
}

.corner-top,
.corner-bottom{
    position:absolute;
    width:90px;
    height:90px;
}

.corner-top{
    top:15px;
    left:15px;
    border-top:6px solid #e23744;
    border-left:6px solid #e23744;
}

.corner-bottom{
    bottom:15px;
    right:15px;
    border-bottom:6px solid #e23744;
    border-right:6px solid #e23744;
}

h2{
    text-align:center;
    color:#e23744;
    margin-bottom:30px;
    position:relative;
    font-size:30px;
}

h2::before,
h2::after{
    content:"";
    position:absolute;
    top:50%;
    width:70px;
    height:3px;
    background:#e23744;
}

h2::before{
    left:0;
}

h2::after{
    right:0;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#444;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:13px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input[type="text"]:focus,
input[type="password"]:focus{
    border-color:#e23744;
    box-shadow:0 0 12px rgba(226,55,68,.4);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
}

.remember{
    display:flex;
    align-items:center;
    gap:8px;
}

.remember input[type="checkbox"]{
    width:18px;
    height:18px;
    margin:0;
    cursor:pointer;
}

.remember label{
    display:inline;
    margin:0;
    font-size:14px;
    font-weight:500;
    color:#444;
    cursor:pointer;
}

.options a{
    color:#e23744;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#e23744,#ff5f6d);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(226,55,68,.5);
}

.register-link{
    text-align:center;
    margin-top:22px;
}

.register-link a{
    color:#e23744;
    text-decoration:none;
    font-weight:bold;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="inner">

<div class="corner-top"></div>
<div class="corner-bottom"></div>

<h2>Login</h2>

<form action="login" method="post">

<div class="input-group">
<label for="name">User Name</label>
<input
type="text"
id="name"
name="name"
placeholder="Enter your user name"
required>
</div>

<div class="input-group">
<label for="password">Password</label>
<input
type="password"
id="password"
name="password"
placeholder="Enter your password"
required>
</div>

<div class="options">



<a href="#">
Forgot Password?
</a>

</div>

<button type="submit">
Login
</button>

<div class="register-link">
Don't have an account?
<a href="register.html">
Create Account
</a>
</div>

</form>

</div>

</div>

</body>
</html>
